name: clawon
description: ClawOn — One app. All your OpenClaw gateways. Every platform.

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# Read more about versioning at semver.org.
version: 1.0.0+8

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # A
  # B
  cupertino_icons: ^1.0.8
  # C
  crypto: ^3.0.0
  cryptography: ^2.7.0
  # D
  device_info_plus: ^12.3.0
  # E
  # F
  flutter_markdown_plus: ^1.0.3
  flutter_mobx: ^2.3.0
  flutter_secure_storage: ^10.0.0
  # G
  get_it: ^9.2.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  # H
  # I
  intl: ^0.20.2
  # J
  json_serializable: ^6.9.0
  # K
  # L
  # M
  mobx: ^2.5.0
  # N
  # O
  # P
  package_info_plus: ^9.0.0
  # Q
  # R
  # S
  shared_preferences: ^2.5.2
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  smooth_page_indicator: ^2.0.1
  # T
  # U
  uuid: ^4.5.1
  # V
  # W
  web_socket_channel: ^3.0.2
  # X
  # Y
  # Z

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The following adds the launcher icon support to your application.
  # run below mentioned commands to generate launcher icons
  # flutter packages get
  # flutter packages pub run flutter_launcher_icons:main
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5
  flutter_lints: ^6.0.0
  mobx_codegen: ^2.6.0
  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/clawon_image_path.png"
  adaptive_icon_background: "#191a2f"
  adaptive_icon_foreground: "assets/icons/clawon_adaptive_icon_foreground.png"
  windows:
    generate: true
    image_path: "assets/icons/clawon_image_path.png"
  macos:
    generate: true
    image_path: "assets/icons/clawon_image_path.png"

# Splash screen configuration
# Run: fvm flutter pub run flutter_native_splash:create
flutter_native_splash:
  # Background color matching the app's adaptive icon background
  color: "#191a2f"
  # Brand image - the claw character
  image: assets/icons/clawon_adaptive_icon_foreground.png
  # Branding text at the bottom
  color_dark: "#191a2f"
  image_dark: assets/icons/clawon_adaptive_icon_foreground.png
  # Android 12+ specific settings
  android_12:
    image: assets/icons/clawon_adaptive_icon_foreground.png
    color: "#191a2f"
    image_dark: assets/icons/clawon_adaptive_icon_foreground.png
    color_dark: "#191a2f"
  # Platform-specific settings
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lang/
